listen_addresses = '*'
max_connections = 100

# KRITISCH für Docker-Networking:
# Dockers Bridge-Netz droppt idle TCP-Verbindungen nach ~900s.
# Ohne diese Werte bekommen Messenger-Worker kryptische "connection reset"-Fehler.
tcp_keepalives_idle = 300
tcp_keepalives_interval = 30
tcp_keepalives_count = 5

# Tote Client-Verbindungen erkennen (PG 14+)
client_connection_check_interval = 5000

# KEINEN globalen statement_timeout setzen – LLM-Inference dauert 30-120+ Sekunden
statement_timeout = 0
idle_in_transaction_session_timeout = 300000
lock_timeout = 30000

# Speicher (konservativ – PG bekommt ~1 GB der 128 GB)
shared_buffers = 256MB
work_mem = 16MB
maintenance_work_mem = 128MB
effective_cache_size = 768MB

# WAL
wal_level = replica
max_wal_size = 1GB
checkpoint_completion_target = 0.9

# Logging
log_min_duration_statement = 1000
log_statement = 'ddl'
log_connections = on
log_disconnections = on
