# docker/nginx/demo.conf
# ──────────────────────────────────────────────────────────────────────────────
# Nginx-Konfiguration für Demo-Routen (CuP&Connect)
# Wird als zusätzliche conf.d-Datei in den bestehenden Nginx-Container gemountet
# Aktiv nur wenn docker-compose.demo.yml als Overlay verwendet wird
# ──────────────────────────────────────────────────────────────────────────────

# ── SPA-Präsentation ────────────────────────────────────────────────────────
location /demo/ {
    alias /var/www/html/demo/;
    index index.html;
    try_files $uri $uri/ /demo/index.html;

    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}

# ── ttyd WebTerminal ─────────────────────────────────────────────────────────
location /terminal/ {
    proxy_pass http://ttyd:7681/terminal/;
    proxy_http_version 1.1;

    # WebSocket-Upgrade (zwingend für ttyd)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts für lang laufende Terminal-Sessions
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Puffer deaktivieren für Echtzeit-Output
    proxy_buffering off;
}

# ── ttyd Static Assets ───────────────────────────────────────────────────────
location /terminal/static/ {
    proxy_pass http://ttyd:7681/terminal/static/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
