# Override für Mistral Small 24B (~20 GB VRAM auf A100-80GB)
# Verwendung: docker compose -f docker-compose.yml -f docker-compose.mistral-small.yml up -d
# Modell lokal installiert via --local-dir (kein HuggingFace-Cache-Format)
services:
  vllm:
    command: >
      --model /root/.cache/huggingface/mistral-small-24b
      --gpu-memory-utilization 0.90
      --max-model-len 32768
      --dtype bfloat16
      --enable-prefix-caching
      --port 8000
