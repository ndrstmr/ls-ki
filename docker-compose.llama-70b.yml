# Override für Llama 3.3 70B AWQ (~37 GB VRAM auf A100-80GB)
# Verwendung: docker compose -f docker-compose.yml -f docker-compose.llama-70b.yml up -d
services:
  vllm:
    command: >
      --model casperhansen/llama-3.3-70b-instruct-awq
      --gpu-memory-utilization 0.95
      --max-model-len 8192
      --dtype bfloat16
      --enable-prefix-caching
      --port 8000
