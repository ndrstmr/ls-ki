# Override für Qwen3-Coder-Next AWQ 4bit (~45 GB VRAM auf A100-80GB)
# Verwendung: docker compose -f docker-compose.yml -f docker-compose.qwen3-coder-next-awq.yml up -d
# Modell lokal installiert via --local-dir (kein HuggingFace-Cache-Format)
services:
  vllm:
    command: >
      --model /root/.cache/huggingface/qwen3-coder-next-awq
      --gpu-memory-utilization 0.85
      --max-model-len 8192
      --max-num-seqs 8
      --dtype bfloat16
      --enable-prefix-caching
      --port 8000
